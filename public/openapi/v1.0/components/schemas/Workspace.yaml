type: object
properties:
  id:
    type: string
    format: uuid
    example: "123e4567-e89b-12d3-a456-426614174000"
  organization_id:
    type: string
    format: uuid
    example: "org-uuid-123"
  name:
    type: string
    example: "Workspace Name"
  description:
    type: string
    nullable: true
    example: "This is a sample workspace description."
  status:
    type: string
    enum: [active, inactive]
    example: "active"
  created_at:
    type: string
    format: date-time
    example: "2024-01-01T12:00:00Z"
  updated_at:
    type: string
    format: date-time
    example: "2024-01-02T12:00:00Z"
required:
  - id
  - organization_id
  - name
  - status
