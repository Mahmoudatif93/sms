type: object
title: OrganizationMember
description: Represents a member of an organization with relevant details like status and roles
required:
  - id
  - name
  - email
  - status
  - roles
properties:
  id:
    type: integer
    description: User ID
    example: 1
  name:
    type: string
    nullable: true
    description: User's full name
    example: John Doe
  email:
    type: string
    format: email
    description: User's email address
    example: john.doe@example.com
  status:
    type: string
    description: User's membership status in the organization
    example: active
  roles:
    type: array
    description: Roles assigned to the user in the organization
    items:
      type: string
    example:
      - Admin
      - Member
  workspaces:
    type: array
    description: Workspaces the user is a member of within the organization
    items:
      type: string
    example:
      - Marketing Workspace
      - Development Workspace
