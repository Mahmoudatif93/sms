post:
  tags:
    - Segments
  summary: Create a new segment in a workspace
  operationId: storeSegment
  parameters:
    - name: workspaceId
      in: path
      required: true
      description: Workspace UUID
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../../components/schemas/SegmentCreate.yaml"
  responses:
    '201':
      description: Segment created successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true
              message:
                type: string
                example: Segment created successfully
              data:
                $ref: "../../../components/schemas/Segment.yaml"
    '400':
      description: Validation error
    '401':
      description: Unauthenticated
    '403':
      description: Forbidden
