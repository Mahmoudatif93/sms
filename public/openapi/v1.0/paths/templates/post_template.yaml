post:
  summary: Create a WhatsApp message template
  operationId: createWhatsappTemplate
  tags:
    - Whatsapp Channel Templates
  parameters:
    - name: channel
      in: path
      required: true
      description: The messaging channel (e.g. whatsapp)
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/post_template.yaml"
  responses:
    '201':
      description: Template created successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true
              message:
                type: string
                example: "Template created successfully"
              data:
                $ref: "../../components/schemas/whatsapp_template.yaml"
    '400':
      description: Validation or processing error
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: Validation Error(s)
              errors:
                type: object
                additionalProperties:
                  type: array
                  items:
                    type: string
    '401':
      description: Unauthorized
    '500':
      description: Internal server error
