post:
  summary: Upload avatar for an organization
  operationId: uploadOrganizationAvatar
  tags:
    - Organizations
  security:
    - BearerAuth: []
    - AccessKeyAuth: []
  parameters:
    - name: organization
      in: path
      required: true
      description: The organization identifier
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          type: object
          required:
            - file
          properties:
            file:
              type: string
              format: binary
              description: Avatar image file (JPG, PNG, JPEG, GIF, max 2MB)
  responses:
    '200':
      description: Avatar uploaded successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true
              message:
                type: string
                example: Media Uploaded Successfully
    '400':
      description: Validation error (e.g., missing or invalid file)
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: Validation Error(s)
              data:
                type: object
                example:
                  file:
                    - "The file field is required."
    '500':
      description: Internal server error during upload
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: File Upload Failed: error message
              data:
                type: object
                example: {}
