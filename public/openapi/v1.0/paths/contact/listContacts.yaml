get:
  summary: List contacts for a workspace
  operationId: listContacts
  tags:
    - Contacts
  security:
    - BearerAuth: []
  parameters:
    - name: workspaceId
      in: path
      required: true
      description: ID of the workspace
      schema:
        type: string
    - name: page
      in: query
      required: false
      description: Page number for pagination
      schema:
        type: integer
        minimum: 1
        default: 1
    - name: per_page
      in: query
      required: false
      description: Number of records per page
      schema:
        type: integer
        minimum: 1
        default: 15
    - name: type
      in: query
      required: false
      description: Filter contacts by type (e.g. phone)
      schema:
        type: string
    - name: search
      in: query
      required: false
      description: Search within identifiers
      schema:
        type: string
    - name: platform
      in: query
      required: false
      description: Filter by platform (e.g. messenger)
      schema:
        type: string
    - name: all
      in: query
      required: false
      description: Return all contacts without pagination
      schema:
        type: boolean
  responses:
    '200':
      description: Contacts retrieved successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true
              message:
                type: string
                example: Contacts retrieved successfully
              data:
                type: object
                properties:
                  current_page:
                    type: integer
                    example: 1
                  total:
                    type: integer
                    example: 100
                  per_page:
                    type: integer
                    example: 15
                  last_page:
                    type: integer
                    example: 7
                  data:
                    type: array
                    items:
                      $ref: ../../components/schemas/contact.yaml
    '404':
      description: Contacts not found
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: Contacts not found
