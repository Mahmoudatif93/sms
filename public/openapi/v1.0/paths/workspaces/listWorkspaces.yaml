get:
  tags:
    - Workspaces
  summary: List all workspaces for an organization
  operationId: listWorkspaces
  security:
    - apiAuth: []
  parameters:
    - name: organizationId
      in: path
      required: true
      description: ID of the organization
      schema:
        type: string
        format: uuid
    - name: per_page
      in: query
      required: false
      schema:
        type: integer
        default: 15
    - name: page
      in: query
      required: false
      schema:
        type: integer
        default: 1
    - name: name
      in: query
      required: false
      schema:
        type: string
    - name: status
      in: query
      required: false
      schema:
        type: string
  responses:
    '200':
      description: List of workspaces
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true
              message:
                type: string
                example: Workspaces retrieved successfully for organization
              data:
                type: array
                items:
                  $ref: "../../components/schemas/Workspace.yaml"
              pagination:
                type: object
                properties:
                  total:
                    type: integer
                  per_page:
                    type: integer
                  current_page:
                    type: integer
                  last_page:
                    type: integer
                  from:
                    type: integer
                  to:
                    type: integer
    '404':
      description: Organization not found
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: Organization not found
