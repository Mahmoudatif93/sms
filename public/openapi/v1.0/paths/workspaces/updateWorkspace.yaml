patch:
  tags:
    - Workspaces
  summary: Update an existing workspace for an organization
  operationId: updateWorkspace
  security:
    - apiAuth: []
  parameters:
    - name: organizationId
      in: path
      required: true
      description: ID of the organization
      schema:
        type: string
        format: uuid
    - name: workspaceId
      in: path
      required: true
      description: ID of the workspace
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            name:
              type: string
              description: Name of the workspace
              example: Updated Workspace Name
            description:
              type: string
              nullable: true
              example: Updated description of the workspace.
            status:
              type: string
              enum: [active, inactive]
              example: active
  responses:
    '200':
      description: Workspace updated successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true
              message:
                type: string
                example: Workspace updated successfully
              data:
                $ref: "../../components/schemas/Workspace.yaml"
    '400':
      description: Validation error
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: Validation Error(s)
              errors:
                type: object
                additionalProperties:
                  type: array
                  items:
                    type: string
    '404':
      description: Workspace or Organization not found
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: Workspace not found in the Organization
