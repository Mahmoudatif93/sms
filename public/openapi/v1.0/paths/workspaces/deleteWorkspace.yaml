openapi: 3.0.3
info:
  title: Workspace API
  version: 1.0.0
paths:
  /organizations/{organizationId}/workspaces/{workspaceId}:
    delete:
      summary: Delete a workspace of an organization
      tags:
        - Workspaces
      parameters:
        - name: organizationId
          in: path
          description: ID of the organization
          required: true
          schema:
            type: integer
        - name: workspaceId
          in: path
          description: ID of the workspace to delete
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Workspace deleted successfully (No Content)
        '404':
          description: Workspace not found in the Organization
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Workspace not found in the Organization
