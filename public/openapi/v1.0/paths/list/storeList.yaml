/api/workspaces/{workspaceId}/lists:
  post:
    tags:
      - Lists
    summary: Create a new IAM list in the workspace
    operationId: storeList
    security:
      - apiAuth: []
    parameters:
      - name: workspaceId
        in: path
        required: true
        description: Workspace UUID
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../../../components/schemas/IAMList.yaml"
    responses:
      '201':
        description: List created successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: List created successfully
                list:
                  $ref: "../../../components/schemas/IAMList.yaml"
      '400':
        description: Validation errors
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Validation Error(s)
                errors:
                  type: object
                  additionalProperties:
                    type: array
                    items:
                      type: string
                  example:
                    name:
                      - The name field is required.
                    contact_ids.0:
                      - The selected contact is invalid.
      '404':
        description: Workspace not found
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  example: Workspace not found
