get:
  tags:
    - Lists
  summary: Get all IAM lists in a workspace
  operationId: getLists
  parameters:
    - name: workspaceId
      in: path
      required: true
      description: Workspace UUID
      schema:
        type: string
        format: uuid
    - name: name
      in: query
      required: false
      description: Filter by list name
      schema:
        type: string
    - name: identifier
      in: query
      required: false
      description: Filter by identifier key (e.g., phone-number, email-address)
      schema:
        type: string
    - name: per_page
      in: query
      required: false
      schema:
        type: integer
        default: 15
    - name: page
      in: query
      required: false
      schema:
        type: integer
        default: 1
  responses:
    '200':
      description: Lists retrieved successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: "../../../components/schemas/IAMList.yaml"
              pagination:
                type: object
                properties:
                  total:
                    type: integer
                    example: 50
                  per_page:
                    type: integer
                    example: 15
                  current_page:
                    type: integer
                    example: 1
                  last_page:
                    type: integer
                    example: 4
                  from:
                    type: integer
                    example: 1
                  to:
                    type: integer
                    example: 15
    '401':
      description: Unauthenticated
    '403':
      description: Forbidden
