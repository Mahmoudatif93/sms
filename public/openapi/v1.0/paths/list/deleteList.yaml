/api/workspaces/{workspaceId}/lists/{id}:
  delete:
    tags:
      - Lists
    summary: Delete a list by ID
    operationId: deleteList
    parameters:
      - name: workspaceId
        in: path
        required: true
        description: Workspace UUID
        schema:
          type: string
          format: uuid
      - name: id
        in: path
        required: true
        description: List UUID to delete
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: List deleted successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: List and its contacts deleted successfully
      '404':
        description: List not found
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  example: List not found
