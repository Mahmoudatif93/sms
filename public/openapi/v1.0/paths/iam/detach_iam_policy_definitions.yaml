post:
  summary: Detach definitions from an IAM policy
  operationId: detachDefinitionsFromIAMPolicy
  tags:
    - IAM
  security:
    - BearerAuth: []
    - AccessKeyAuth: []
  parameters:
    - name: policy
      in: path
      required: true
      description: The ID of the IAM policy
      schema:
        type: integer
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - definition_ids
          properties:
            definition_ids:
              type: array
              minItems: 1
              items:
                type: integer
              description: List of definition IDs to detach
              example: [2, 4]
  responses:
    '200':
      description: Definitions detached successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true
              message:
                type: string
                example: Definitions detached successfully
              data:
                $ref: ../../components/schemas/iam_policy.yaml
    '400':
      description: Some definitions are not attached
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: Some definitions are not attached to this policy.
              data:
                type: object
                properties:
                  not_attached:
                    type: array
                    items:
                      type: integer
                    example: [5, 7]
    '401':
      description: Unauthorized – authentication failed
