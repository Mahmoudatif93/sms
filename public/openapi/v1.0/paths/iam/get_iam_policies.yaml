get:
  summary: List IAM policies
  operationId: listIAMPolicies
  tags:
    - IAM
  security:
    - BearerAuth: []
    - AccessKeyAuth: []
  parameters:
    - name: name
      in: query
      required: false
      description: Filter policies by name (partial match)
      schema:
        type: string
    - name: per_page
      in: query
      required: false
      description: Number of items per page (default: 15)
      schema:
        type: integer
        minimum: 1
        default: 15
    - name: page
      in: query
      required: false
      description: Page number for pagination
      schema:
        type: integer
        minimum: 1
        default: 1
  responses:
    '200':
      description: List of IAM policies
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true
              message:
                type: string
                example: IAM Policies retrieved successfully
              data:
                type: object
                properties:
                  current_page:
                    type: integer
                    example: 1
                  total:
                    type: integer
                    example: 25
                  per_page:
                    type: integer
                    example: 15
                  last_page:
                    type: integer
                    example: 2
                  data:
                    type: array
                    items:
                      $ref: ../../components/schemas/iam_policy.yaml
    '401':
      description: Unauthorized – authentication required
